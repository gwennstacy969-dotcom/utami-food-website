<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FF8C00;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#FFA500;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="glass" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#FFD700;stop-opacity:0.9" />
      <stop offset="100%" style="stop-color:#FF8C00;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="12" fill="url(#bg)"/>
  <!-- Glass -->
  <rect x="65" y="35" width="70" height="110" rx="8" fill="url(#glass)" stroke="#fff" stroke-width="2" opacity="0.9"/>
  <!-- Ice cubes -->
  <rect x="75" y="50" width="18" height="16" rx="3" fill="#fff" opacity="0.6"/>
  <rect x="100" y="55" width="18" height="16" rx="3" fill="#fff" opacity="0.5"/>
  <rect x="85" y="72" width="18" height="16" rx="3" fill="#fff" opacity="0.4"/>
  <!-- Orange slice -->
  <circle cx="130" cy="50" r="18" fill="#FF6347" stroke="#FFD700" stroke-width="2"/>
  <line x1="130" y1="35" x2="130" y2="65" stroke="#FFD700" stroke-width="1.5"/>
  <line x1="115" y1="50" x2="145" y2="50" stroke="#FFD700" stroke-width="1.5"/>
  <line x1="118" y1="38" x2="142" y2="62" stroke="#FFD700" stroke-width="1.5"/>
  <line x1="142" y1="38" x2="118" y2="62" stroke="#FFD700" stroke-width="1.5"/>
  <!-- Straw -->
  <rect x="95" y="20" width="5" height="90" rx="2" fill="#FF4500" transform="rotate(10, 97, 65)"/>
  <!-- Text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">Jus Jeruk</text>
</svg>
