<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="bg2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4FC3F7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0288D1;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="water" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#E1F5FE;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#81D4FA;stop-opacity:0.9" />
    </linearGradient>
  </defs>
  <rect width="200" height="200" rx="12" fill="url(#bg2)"/>
  <!-- Glass -->
  <rect x="65" y="30" width="70" height="115" rx="8" fill="url(#water)" stroke="#fff" stroke-width="2.5" opacity="0.9"/>
  <!-- Ice cubes -->
  <rect x="75" y="45" width="20" height="18" rx="4" fill="#fff" opacity="0.7"/>
  <rect x="100" y="50" width="20" height="18" rx="4" fill="#fff" opacity="0.6"/>
  <rect x="82" y="70" width="20" height="18" rx="4" fill="#fff" opacity="0.5"/>
  <!-- Bubbles -->
  <circle cx="80" cy="110" r="4" fill="#fff" opacity="0.5"/>
  <circle cx="95" cy="120" r="3" fill="#fff" opacity="0.4"/>
  <circle cx="115" cy="105" r="5" fill="#fff" opacity="0.45"/>
  <circle cx="105" cy="130" r="3" fill="#fff" opacity="0.35"/>
  <!-- Water droplet on glass -->
  <ellipse cx="60" cy="80" rx="4" ry="6" fill="#fff" opacity="0.5"/>
  <ellipse cx="140" cy="95" rx="4" ry="6" fill="#fff" opacity="0.5"/>
  <!-- Text -->
  <text x="100" y="175" font-family="Arial, sans-serif" font-size="16" font-weight="bold" fill="#fff" text-anchor="middle">Air Putih</text>
</svg>
